<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>\u0c85\u0cae\u0ccd\u0cae \u2764\ufe0f \u2014 Happy Mother's Day</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Great+Vibes&display=swap" rel="stylesheet" />
<style>
  /* \u2500\u2500\u2500 RESET & BASE \u2500\u2500\u2500 */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans Kannada', sans-serif; }

  /* \u2500\u2500\u2500 CSS VARIABLES \u2500\u2500\u2500 */
  :root {
    --pink:   #ff6b9d;
    --rose:   #e8456a;
    --gold:   #ffd700;
    --amber:  #ffb347;
    --cream:  #fff4e6;
    --deep:   #1a0a10;
    --glass:  rgba(255,255,255,0.08);
  }

  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
     SCREEN 1 \u2014 OPENING
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  #screen-open {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #3d0020 0%, #1a0010 40%, #0d0005 100%);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  #screen-open.hide { opacity: 0; transform: scale(1.08); pointer-events: none; }

  /* animated mesh background */
  #screen-open::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 70% 80%, rgba(255,107,157,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 20% 10%, rgba(255,215,0,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 80% 80% at 50% 50%, rgba(232,69,106,0.06) 0%, transparent 70%);
    animation: meshPulse 6s ease-in-out infinite alternate;
  }
  @keyframes meshPulse {
    from { opacity: 0.7; } to { opacity: 1; }
  }

  /* \u2500\u2500 PARTICLE CANVAS \u2500\u2500 */
  #particleCanvas { position: absolute; inset: 0; pointer-events: none; }

  /* \u2500\u2500 HERO TEXT \u2500\u2500 */
  .hero-wrap {
    position: relative; text-align: center; z-index: 2;
    animation: fadeInUp 1.8s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(50px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .amma-title {
    font-size: clamp(4rem, 14vw, 9rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #ffd700 0%, #ff6b9d 40%, #fff4e6 70%, #ffb347 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255,107,157,0.6));
    animation: heartbeatGlow 2s ease-in-out infinite;
  }
  @keyframes heartbeatGlow {
    0%,100% { filter: drop-shadow(0 0 30px rgba(255,107,157,0.5)); }
    50%      { filter: drop-shadow(0 0 60px rgba(255,107,157,0.9)) drop-shadow(0 0 100px rgba(255,215,0,0.3)); }
  }

  .amma-sub {
    margin-top: 1rem;
    font-size: clamp(1rem, 3.5vw, 1.6rem);
    font-weight: 300;
    color: rgba(255,244,230,0.75);
    letter-spacing: 0.04em;
    animation: fadeInUp 1.8s 0.4s cubic-bezier(.16,1,.3,1) both;
  }

  /* \u2500\u2500 GLOW BUTTON \u2500\u2500 */
  #btn-start {
    margin-top: 3.5rem;
    padding: 1.1rem 3rem;
    font-family: 'Noto Sans Kannada', sans-serif;
    font-size: clamp(1rem, 3vw, 1.35rem);
    font-weight: 600;
    color: #fff;
    border: none; border-radius: 60px; cursor: pointer;
    background: linear-gradient(135deg, #e8456a, #ff6b9d, #ffb347);
    background-size: 200% 200%;
    box-shadow: 0 0 30px rgba(232,69,106,0.6), 0 0 60px rgba(255,107,157,0.3), 0 4px 20px rgba(0,0,0,0.4);
    animation: btnAppear 1.8s 0.8s cubic-bezier(.16,1,.3,1) both, gradShift 3s ease-in-out infinite, btnPulse 2s ease-in-out infinite;
    transition: transform 0.2s;
  }
  @keyframes btnAppear {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 30px rgba(232,69,106,0.6), 0 0 60px rgba(255,107,157,0.3); }
    50%      { box-shadow: 0 0 50px rgba(232,69,106,0.9), 0 0 100px rgba(255,107,157,0.5), 0 0 140px rgba(255,215,0,0.2); }
  }
  #btn-start:hover  { transform: scale(1.06); }
  #btn-start:active { transform: scale(0.97); }

  /* floating hearts open screen */
  .heart-float { position: absolute; font-size: 1.4rem; opacity: 0; animation: floatHeart linear infinite; pointer-events: none; z-index: 1; }
  @keyframes floatHeart {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.8); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-110vh) rotate(30deg) scale(1.2); }
  }

  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
     SCREEN 2 \u2014 GRAPH / CALCULATING
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  #screen-calc {
    position: fixed; inset: 0; z-index: 9;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
    background: radial-gradient(ellipse at 50% 0%, #200010 0%, #0d0005 60%, #05000a 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease;
  }
  #screen-calc.show { opacity: 1; pointer-events: all; }

  /* scanlines overlay */
  #screen-calc::after {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(255,107,157,0.02) 3px, rgba(255,107,157,0.02) 4px);
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 80px; } }

  .calc-label {
    font-size: clamp(0.9rem, 3vw, 1.3rem);
    font-weight: 600;
    color: var(--pink);
    letter-spacing: 0.06em;
    text-align: center;
    padding: 0 1rem;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 20px rgba(255,107,157,0.8);
    animation: textFlicker 3s ease-in-out infinite;
    z-index: 2;
  }
  @keyframes textFlicker {
    0%,100% { opacity: 1; }
    92%      { opacity: 1; }
    93%      { opacity: 0.4; }
    94%      { opacity: 1; }
    96%      { opacity: 0.7; }
    97%      { opacity: 1; }
  }

  .percent-display {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(90deg, #ffd700, #ff6b9d, #ffb347);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
    margin-bottom: 0.5rem;
    z-index: 2;
  }

  .status-text {
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    color: rgba(255,180,160,0.6);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    z-index: 2;
  }

  /* \u2500\u2500 GRAPH CONTAINER \u2500\u2500 */
  .graph-wrap {
    position: relative;
    width: min(90vw, 700px);
    height: clamp(180px, 35vh, 280px);
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,107,157,0.15);
    border-radius: 16px;
    padding: 16px 16px 0;
    overflow: hidden;
    z-index: 2;
    box-shadow: 0 0 40px rgba(232,69,106,0.1), inset 0 0 60px rgba(255,107,157,0.03);
  }

  /* grid lines */
  .graph-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent 0%, transparent calc(25% - 1px), rgba(255,107,157,0.07) calc(25% - 1px), rgba(255,107,157,0.07) 25%),
      repeating-linear-gradient(90deg, transparent 0%, transparent calc(10% - 1px), rgba(255,107,157,0.04) calc(10% - 1px), rgba(255,107,157,0.04) 10%);
    border-radius: 16px;
  }

  .graph-bars {
    display: flex;
    align-items: flex-end;
    justify-content: space-evenly;
    height: 100%;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .bar-col {
    display: flex; flex-direction: column; align-items: center;
    flex: 1; height: 100%; justify-content: flex-end;
    gap: 4px;
  }

  .bar {
    width: 100%;
    min-width: 22px;
    border-radius: 8px 8px 0 0;
    transition: height 0.08s ease;
    position: relative;
    overflow: hidden;
  }
  /* shimmer on bar */
  .bar::after {
    content: '';
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 1.5s ease-in-out infinite;
  }
  @keyframes shimmer { to { left: 150%; } }

  .bar-val {
    font-size: clamp(0.5rem, 1.5vw, 0.7rem);
    color: rgba(255,230,200,0.8);
    font-weight: 600;
    white-space: nowrap;
  }

  /* \u2500\u2500 STATS ROW \u2500\u2500 */
  .stats-row {
    display: flex; gap: 1rem; margin-top: 1rem; z-index: 2; flex-wrap: wrap; justify-content: center;
  }
  .stat-chip {
    padding: 0.4rem 1rem;
    border-radius: 30px;
    border: 1px solid rgba(255,107,157,0.3);
    background: rgba(255,107,157,0.07);
    font-size: clamp(0.6rem, 1.8vw, 0.78rem);
    color: rgba(255,200,180,0.85);
    font-weight: 600;
    letter-spacing: 0.05em;
    animation: chipGlow 2s ease-in-out infinite alternate;
  }
  @keyframes chipGlow {
    from { border-color: rgba(255,107,157,0.2); box-shadow: none; }
    to   { border-color: rgba(255,107,157,0.6); box-shadow: 0 0 12px rgba(255,107,157,0.3); }
  }

  /* loading bar */
  .load-bar-wrap {
    width: min(90vw, 700px);
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    margin-top: 1.2rem;
    overflow: hidden;
    z-index: 2;
  }
  .load-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, #e8456a, #ff6b9d, #ffd700);
    box-shadow: 0 0 12px rgba(255,107,157,0.8);
    transition: width 0.1s linear;
  }

  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
     POPUP \u2014 FINAL REVEAL
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  #popup-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5,0,8,0.7);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease;
    padding: 1rem;
  }
  #popup-overlay.show { opacity: 1; pointer-events: all; }

  .popup-card {
    position: relative;
    width: min(92vw, 520px);
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,107,157,0.4);
    border-radius: 28px;
    padding: clamp(2rem, 6vw, 3.5rem) clamp(1.5rem, 5vw, 3rem);
    backdrop-filter: blur(30px);
    box-shadow:
      0 0 0 1px rgba(255,215,0,0.1),
      0 0 60px rgba(232,69,106,0.3),
      0 0 120px rgba(255,107,157,0.15),
      0 30px 80px rgba(0,0,0,0.5);
    text-align: center;
    transform: scale(0.8) translateY(30px);
    transition: transform 1.2s cubic-bezier(.16,1,.3,1), opacity 1s ease;
    overflow: hidden;
  }
  #popup-overlay.show .popup-card { transform: scale(1) translateY(0); }

  /* animated border glow */
  .popup-card::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 30px;
    background: conic-gradient(from 0deg, #e8456a, #ffd700, #ff6b9d, #ffb347, #e8456a);
    z-index: -1;
    animation: borderSpin 4s linear infinite;
    opacity: 0.6;
  }
  .popup-card::after {
    content: '';
    position: absolute; inset: 2px;
    background: rgba(18,3,14,0.88);
    border-radius: 26px;
    z-index: -1;
  }
  @keyframes borderSpin { to { transform: rotate(360deg); } }

  /* \u2500\u2500 popup floating hearts \u2500\u2500 */
  .popup-hearts { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 28px; }
  .ph { position: absolute; bottom: -10%; font-size: 1.2rem; opacity: 0; animation: popHeart 3s ease-in infinite; }
  @keyframes popHeart {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    20%  { opacity: 0.9; }
    80%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-110%) scale(1.3); }
  }

  .popup-icon { font-size: clamp(2
